<div class="dashboard-wrapper p-4">
  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <h2 class="vintage-heading">Staff Settings</h2>
  </div>

  <!-- Search -->
  <div class="search-box mb-3">
  <input
    type="text"
    class="form-control"
    placeholder="Search staff..."
    [(ngModel)]="searchText"
    (input)="filterStaff()"
  />
</div>

  <!-- Staff Table -->
  <div class="table-responsive">
    <table class="table vintage-table" (input)="filterStaff()">
      <thead>
        <tr>
          <th>Name</th>
          <th>Role</th>
          <th>Status</th>
          <th class="text-center">Enable / Disable</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let staff of filteredStaff">
          <td>{{ staff.name }}</td>

          <td>
            <span class="role-badge">
              {{ staff.designation }}
            </span>
          </td>

          <td>
            <span
              class="status-badge"
              [ngClass]="staff.status === 'active' ? 'active' : 'inactive'"
            >
              {{ staff.status }}
            </span>
          </td>

          <td class="text-center">
            <label class="switch">
              <input
                type="checkbox"
                [checked]="staff.status === 'active'"
                (change)="toggleStatus(staff)"
              />

              <span class="slider"></span>
            </label>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
